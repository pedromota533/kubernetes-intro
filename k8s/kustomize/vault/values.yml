global:
  enabled: true
  tlsDisable: true

injector:
  enabled: false

server:
  enabled: true
  dataStorage:
    enabled: true
    size: 1Gi
  standalone:
    enabled: true
    config: |-
      ui = true

      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "file" {
        path = "/vault/data"
      }

      api_addr = "https://vault.local"
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: vault.local
        paths:
          - /
    tls:
      - hosts:
          - vault.local

ui:
  enabled: true
