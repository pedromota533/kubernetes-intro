apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: triggerdev
  namespace: argocd
  # Cascade delete: removing this Application also removes all deployed resources
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default

  # Multi-source: OCI chart + git repo for values + routing
  sources:
    # Source 1: Helm chart from OCI registry
    - repoURL: oci://ghcr.io/triggerdotdev/charts
      chart: trigger
      targetRevision: "4.4.6"
      helm:
        # Pull values from the git source below (referenced via $values)
        valueFiles:
          - $values/k8s/helm/triggerdev/manifest/Manifest.yml

    # Source 2: Git repo (used only as values reference)
    - repoURL: https://github.com/pedromota533/kubernetes-intro
      targetRevision: HEAD
      ref: values

    # Source 3: VirtualService for istio routing (owned by this app)
    - repoURL: https://github.com/pedromota533/kubernetes-intro
      targetRevision: HEAD
      path: k8s/helm/triggerdev/routing

  destination:
    server: https://kubernetes.default.svc
    namespace: triggerdev

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
